<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offlo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 340px;
      background: #0A0A0F;
      color: #FFFFFF;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    #app { padding: 16px; }

    /* ── 스피너 ── */
    .spinner-wrap {
      display: flex; align-items: center; justify-content: center;
      height: 160px;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid rgba(61,219,135,0.25);
      border-top-color: #3DDB87;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── 헤더 ── */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .logo {
      color: #3DDB87; font-size: 20px; font-weight: 700;
      letter-spacing: -0.5px;
    }

    /* ── 버튼 ── */
    .btn-primary {
      display: block; width: 100%; padding: 13px;
      background: #3DDB87; color: #0A0A0F;
      border: none; border-radius: 999px;
      font-size: 14px; font-weight: 700; cursor: pointer;
    }
    .btn-primary:hover { opacity: 0.9; }

    .btn-primary-sm {
      padding: 8px 14px;
      background: #3DDB87; color: #0A0A0F;
      border: none; border-radius: 999px;
      font-size: 13px; font-weight: 700; cursor: pointer;
      flex-shrink: 0;
    }
    .btn-primary-sm:hover { opacity: 0.9; }

    .btn-ghost {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      color: rgba(255,255,255,0.45);
      font-size: 12px; cursor: pointer;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.3); }

    /* ── 로그인 ── */
    .login-section { text-align: center; padding: 16px 0 8px; }
    .login-desc {
      color: rgba(255,255,255,0.4); font-size: 13px;
      line-height: 1.8; margin-bottom: 24px;
    }

    /* ── 섹션 ── */
    .section {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 10px;
    }
    .section-title {
      color: rgba(255,255,255,0.35);
      font-size: 11px; font-weight: 600;
      text-transform: uppercase; letter-spacing: 0.6px;
      margin-bottom: 10px;
    }

    /* ── 도메인 목록 ── */
    .domain-list { margin-bottom: 10px; min-height: 20px; }
    .domain-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 7px 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      margin-bottom: 5px;
    }
    .domain-text {
      color: rgba(255,255,255,0.75); font-size: 13px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .btn-remove {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.25); font-size: 18px;
      line-height: 1; padding: 0 2px; flex-shrink: 0;
      transition: color 0.15s;
    }
    .btn-remove:hover { color: #ff7070; }

    .empty-msg {
      color: rgba(255,255,255,0.25); font-size: 13px;
      text-align: center; padding: 8px 0;
    }

    /* ── 추가 입력 ── */
    .add-row { display: flex; gap: 8px; }
    .input-domain {
      flex: 1; padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff; font-size: 13px; outline: none;
    }
    .input-domain::placeholder { color: rgba(255,255,255,0.2); }
    .input-domain:focus { border-color: rgba(61,219,135,0.4); }
    .btn-add {
      padding: 8px 14px;
      background: rgba(61,219,135,0.1);
      border: 1px solid rgba(61,219,135,0.25);
      border-radius: 8px;
      color: #3DDB87; font-size: 13px; font-weight: 600;
      cursor: pointer; flex-shrink: 0;
    }
    .btn-add:hover { background: rgba(61,219,135,0.18); }

    /* ── 세션: 대기 ── */
    .session-idle {}
    .session-guide {
      color: rgba(255,255,255,0.4); font-size: 12px; margin-bottom: 10px;
    }
    .duration-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 6px; margin-bottom: 10px;
    }
    .btn-dur {
      padding: 10px 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: rgba(255,255,255,0.7); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.15s;
    }
    .btn-dur:hover {
      background: rgba(61,219,135,0.1);
      border-color: rgba(61,219,135,0.3);
      color: #3DDB87;
    }
    .custom-row { display: flex; gap: 8px; }
    .input-custom {
      flex: 1; padding: 8px 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: #fff; font-size: 13px; outline: none;
      -moz-appearance: textfield;
    }
    .input-custom::-webkit-inner-spin-button,
    .input-custom::-webkit-outer-spin-button { -webkit-appearance: none; }
    .input-custom::placeholder { color: rgba(255,255,255,0.2); }
    .input-custom:focus { border-color: rgba(61,219,135,0.4); }

    /* ── 세션: 진행 중 ── */
    .session-active {
      display: flex; align-items: center; gap: 12px;
    }
    .pulse-dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: #3DDB87; flex-shrink: 0;
      box-shadow: 0 0 0 0 rgba(61,219,135,0.5);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(61,219,135,0.5); }
      70%  { box-shadow: 0 0 0 8px rgba(61,219,135,0); }
      100% { box-shadow: 0 0 0 0 rgba(61,219,135,0); }
    }
    .session-info { flex: 1; }
    .session-title {
      display: block; color: rgba(255,255,255,0.5);
      font-size: 11px; margin-bottom: 3px;
    }
    .countdown {
      color: #3DDB87; font-size: 22px; font-weight: 700;
      font-variant-numeric: tabular-nums; letter-spacing: 1px;
    }
    .btn-stop {
      padding: 7px 14px; border-radius: 999px; cursor: pointer;
      background: rgba(255,100,100,0.1);
      border: 1px solid rgba(255,100,100,0.25);
      color: #ff7070; font-size: 13px; font-weight: 600;
      flex-shrink: 0;
    }
    .btn-stop:hover { background: rgba(255,100,100,0.18); }

    /* ── 오늘 적립 바 ── */
    .today-bar {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(61,219,135,0.07);
      border: 1px solid rgba(61,219,135,0.15);
      border-radius: 12px;
      padding: 12px 16px;
    }
    .today-label { color: rgba(255,255,255,0.45); font-size: 12px; }
    .today-value { color: #3DDB87; font-size: 18px; font-weight: 700; }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(255,255,255,0.1); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15);
      color: #fff; font-size: 13px;
      padding: 9px 18px; border-radius: 999px;
      white-space: nowrap; pointer-events: none;
      animation: toast-in 0.2s ease;
    }
    @keyframes toast-in { from { opacity:0; bottom:8px } to { opacity:1; bottom:16px } }
  </style>
</head>
<body>
  <div id="app">
    <div class="spinner-wrap"><div class="spinner"></div></div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
