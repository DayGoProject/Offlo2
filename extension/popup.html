<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offlo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      background: #0A0A0F;
      color: #FFFFFF;
      font-family: -apple-system, 'Segoe UI', sans-serif;
      font-size: 14px;
    }

    #app { padding: 16px; min-height: 180px; }

    /* 로딩 스피너 */
    .spinner-wrap {
      display: flex; align-items: center; justify-content: center;
      height: 140px;
    }
    .spinner {
      width: 22px; height: 22px;
      border: 2px solid rgba(61,219,135,0.3);
      border-top-color: #3DDB87;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 헤더 */
    .header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 16px;
    }
    .logo { color: #3DDB87; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }

    /* 버튼 */
    .btn-primary {
      display: block; width: 100%; padding: 12px;
      background: #3DDB87; color: #0A0A0F;
      border: none; border-radius: 999px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; text-align: center;
      margin-top: 12px;
    }
    .btn-primary:hover { opacity: 0.9; }
    .btn-ghost {
      padding: 5px 12px;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 999px;
      color: rgba(255,255,255,0.5);
      font-size: 12px; cursor: pointer;
    }
    .btn-ghost:hover { border-color: rgba(255,255,255,0.3); }

    /* 로그인 섹션 */
    .login-section { text-align: center; padding: 12px 0 4px; }
    .desc { color: rgba(255,255,255,0.45); line-height: 1.7; margin-bottom: 20px; }
    .error-msg { color: #ff7070; font-size: 12px; margin-bottom: 10px; }

    /* 총 사용 시간 카드 */
    .total-card {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(61,219,135,0.07);
      border: 1px solid rgba(61,219,135,0.18);
      border-radius: 12px; padding: 12px 16px;
      margin-bottom: 14px;
    }
    .total-label { color: rgba(255,255,255,0.5); font-size: 12px; }
    .total-time  { color: #3DDB87; font-size: 20px; font-weight: 700; }

    /* 도메인 목록 */
    .domains-section { margin-bottom: 4px; }
    .domain-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 9px;
    }
    .domain-name {
      width: 88px; flex-shrink: 0;
      color: rgba(255,255,255,0.75); font-size: 12px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .bar-wrap {
      flex: 1; height: 5px;
      background: rgba(255,255,255,0.07); border-radius: 4px;
    }
    .bar { height: 100%; background: #3DDB87; border-radius: 4px; }
    .domain-time {
      width: 44px; text-align: right;
      color: rgba(255,255,255,0.4); font-size: 11px; flex-shrink: 0;
    }
    .no-data {
      color: rgba(255,255,255,0.35); font-size: 13px;
      text-align: center; padding: 16px 0;
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="spinner-wrap">
      <div class="spinner"></div>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
